<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Shaytye Dashboard</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root{--ink:#221B1F;--ink2:#7A6C73;--rose:#F2C7D5;--rose-d:#D9899F;--rose-l:#FBEAF0;--gold:#D6B285;
--cream:#FFFFFF;--cream2:#FBF6F2;--line:#F0E2E8;--ok:#4FA37A;--warn:#C98A2E;--bad:#C25B5B;
--shadow:0 12px 34px rgba(205,135,165,.12);--r:16px}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;overflow-x:clip}
body{font-family:'Outfit','Segoe UI',system-ui,sans-serif;background:linear-gradient(172deg,#FDF2F6 0%,#FAF2EA 60%,#F8EEE1 100%);color:var(--ink);line-height:1.55;min-height:100vh;overflow-x:clip}
button{font-family:inherit;cursor:pointer}
a{color:var(--rose-d)}
.hide{display:none!important}

/* ---- login ---- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--cream);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.login-box{width:100%;max-width:400px;padding:36px 32px;text-align:center}
.login-box img{height:60px;margin-bottom:8px}
.login-box h1{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin-bottom:4px}
.login-box p{color:var(--ink2);font-size:14px;margin-bottom:22px}
.field{text-align:left;margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;letter-spacing:.02em}
input,select,textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--cream);
border:1px solid var(--line);border-radius:11px;padding:11px 13px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--rose-d)}
textarea{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:999px;
background:var(--rose-d);color:#fff;font-weight:600;font-size:15px;padding:12px 22px;width:100%;transition:transform .15s,box-shadow .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(205,135,165,.32)}
.btn:disabled{opacity:.55;cursor:default;transform:none;box-shadow:none}
.btn.ghost{background:transparent;color:var(--rose-d);border:1px solid var(--line)}
.btn.sm{width:auto;padding:8px 16px;font-size:13px}
.btn.tiny{width:auto;padding:5px 11px;font-size:12px}
.btn.danger{background:var(--bad)}
.btn.gray{background:#EDE4E8;color:var(--ink)}
.msg{font-size:13px;margin-top:12px;min-height:18px}
.msg.err{color:var(--bad)}.msg.ok{color:var(--ok)}

/* ---- shell ---- */
#app{display:flex;min-height:100vh}
.side{width:230px;flex-shrink:0;background:var(--cream);border-right:1px solid var(--line);
display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .brand{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.side .brand img{height:34px}
.side .brand b{font-family:'Fraunces',serif;font-weight:600;font-size:16px}
.nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;
border-radius:11px;padding:11px 13px;color:var(--ink2);font-size:14.5px;font-weight:500;transition:background .15s,color .15s}
.nav button:hover{background:var(--cream2)}
.nav button.on{background:var(--rose-l);color:var(--rose-d);font-weight:600}
.nav button .ic{width:18px;text-align:center;font-size:15px}
.nav .badge{margin-left:auto;background:var(--rose-d);color:#fff;font-size:11px;font-weight:700;border-radius:99px;padding:1px 7px}
.side .foot{padding:14px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--ink2)}
.side .foot button{background:none;border:0;color:var(--rose-d);font-size:12px;font-weight:600;padding:0;margin-top:4px}

.main{flex:1;min-width:0;padding:26px 30px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.topbar h2{font-family:'Fraunces',serif;font-weight:600;font-size:24px}
.topbar .sub{color:var(--ink2);font-size:13px}

/* ---- stat cards ---- */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:26px}
.stat{background:var(--cream);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.stat .n{font-family:'Fraunces',serif;font-size:28px;font-weight:600;line-height:1.1}
.stat .l{font-size:12.5px;color:var(--ink2);margin-top:3px}
.stat.accent .n{color:var(--rose-d)}
.stat.warn .n{color:var(--warn)}

/* ---- panels + tables ---- */
.panel{background:var(--cream);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:22px}
.panel .ph{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.panel .ph h3{font-size:15px;font-weight:600}
.tablewrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);font-weight:700;padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--cream2)}
td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:0}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--cream2)}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
.pill.lead{background:#EAF3FF;color:#3E7BC2}
.pill.active{background:#E7F6EE;color:var(--ok)}
.pill.klant{background:var(--rose-l);color:var(--rose-d)}
.pill.done{background:#EDE4E8;color:var(--ink2)}
.pill.new{background:#FFF3E0;color:var(--warn)}
.pill.win{background:#E7F6EE;color:var(--ok)}
.pill.no{background:#F3E9EC;color:var(--ink2)}
.muted{color:var(--ink2)}
.right{text-align:right}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11px;background:var(--cream2);border:1px solid var(--line);border-radius:99px;padding:2px 8px;color:var(--ink2)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.toolbar input{max-width:260px}
.toolbar select{max-width:190px}
.seg{display:inline-flex;background:var(--cream);border:1px solid var(--line);border-radius:999px;overflow:hidden}
.seg button{background:transparent;border:0;padding:7px 14px;font-size:13px;font-weight:600;color:var(--ink2)}
.seg button.on{background:var(--rose-d);color:#fff}
.empty{padding:40px 20px;text-align:center;color:var(--ink2);font-size:14px}

/* ---- modal ---- */
.overlay{position:fixed;inset:0;background:rgba(34,27,31,.5);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{width:100%;max-width:520px;background:var(--cream);border-radius:var(--r);box-shadow:0 30px 70px rgba(0,0,0,.3)}
.modal .mh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal .mh h3{font-family:'Fraunces',serif;font-weight:600;font-size:19px}
.modal .mh .x{background:none;border:0;font-size:22px;color:var(--ink2);line-height:1}
.modal .mb{padding:20px 22px}
.modal .mf{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.note{background:var(--cream2);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px;font-size:13px}
.note .meta{font-size:11px;color:var(--ink2);margin-top:4px}

/* ---- availability ---- */
.days{display:flex;flex-direction:column;gap:8px}
.dayrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:var(--cream)}
.dayrow .dn{width:96px;font-weight:600;font-size:14px}
.dayrow input[type=time]{width:120px}
.dayrow.off{opacity:.5}
.switch{position:relative;width:42px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .sl{position:absolute;inset:0;background:#DED2D8;border-radius:99px;transition:.2s}
.switch .sl:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked+.sl{background:var(--rose-d)}
.switch input:checked+.sl:before{transform:translateX(18px)}

.langtog{display:inline-flex;border:1px solid var(--line);border-radius:99px;overflow:hidden;background:var(--cream)}
.langtog .langbtn{background:transparent;border:0;padding:4px 12px;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer}
.langtog .langbtn.on{background:var(--rose-d);color:#fff}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
padding:11px 20px;border-radius:99px;font-size:14px;font-weight:500;opacity:0;transition:.28s;z-index:200;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--bad)}

@media(max-width:760px){
  .side{position:fixed;left:0;top:0;z-index:60;transform:translateX(-100%);transition:transform .25s;box-shadow:0 0 40px rgba(0,0,0,.2)}
  .side.open{transform:translateX(0)}
  .main{padding:18px 16px 60px}
  .mobile-bar{display:flex!important}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55}
}
.mobile-bar{display:none;align-items:center;gap:12px;margin-bottom:18px}
.mobile-bar button{background:var(--cream);border:1px solid var(--line);border-radius:11px;width:42px;height:42px;font-size:19px}
.mobile-bar b{font-family:'Fraunces',serif;font-size:18px}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="card login-box">
    <div style="display:flex;justify-content:center;margin-bottom:10px"><div class="langtog"><button class="langbtn" data-l="nl">NL</button><button class="langbtn" data-l="en">EN</button></div></div>
    <img src="/logo.png" alt="Shaytye" onerror="this.style.display='none'">
    <h1>Dashboard</h1>
    <p id="login-sub">Log in met je e-mailadres</p>
    <div id="step-email">
      <div class="field"><label id="lbl-email">E-mailadres</label><input id="l-email" type="email" placeholder="jij@shaytye.com" autocomplete="email"></div>
      <button class="btn" id="l-send">Stuur inlogcode</button>
    </div>
    <div id="step-code" class="hide">
      <div class="field"><label id="lbl-code">Code uit je e-mail</label><input id="l-code" inputmode="numeric" maxlength="6" placeholder="6-cijferige code"></div>
      <button class="btn" id="l-verify">Inloggen</button>
      <button class="btn ghost" id="l-back" style="margin-top:8px">Ander e-mailadres</button>
    </div>
    <div class="msg" id="l-msg"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hide">
  <aside class="side" id="side">
    <div class="brand"><img src="/logo.png" alt="" onerror="this.style.display='none'"><b>Shaytye</b></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot"><div class="langtog" style="margin-bottom:10px"><button class="langbtn" data-l="nl">NL</button><button class="langbtn" data-l="en">EN</button></div><br><span id="ingelabel">Ingelogd als</span><br><span id="who"></span><br><button id="logout">Uitloggen</button></div>
  </aside>
  <div class="scrim hide" id="scrim"></div>
  <main class="main">
    <div class="mobile-bar"><button id="burger">&#9776;</button><b>Shaytye</b></div>
    <div id="view"></div>
  </main>
</div>

<div id="toast"></div>

<script>
var API = "https://ccdiibhzrtakczvkvqyw.supabase.co/functions/v1/shaytye-admin";
var KEY = "sb_publishable_Ds3dufQ1O9oQNGRJCa6QZg_9EBY7jq7";
var TOKEN = localStorage.getItem("shaytye_admin_token") || "";
var EMAIL = localStorage.getItem("shaytye_admin_email") || "";
var STATE = { tab:"overview", stats:null };
var LANG = localStorage.getItem("shaytye_admin_lang") || "nl";
var T = {

 "Cliënt bewerken":"Edit client","Nieuwe cliënt":"New client","Naam *":"Name *","Besteed (€)":"Spent (€)","Tags (komma-gescheiden)":"Tags (comma-separated)","Notitie":"Note",
 "Verwijderen":"Delete","Annuleren":"Cancel","Opslaan":"Save",

 "Aanvragen en afspraken":"Requests and appointments","Nog geen boekingen. Aanvragen vanaf de website verschijnen hier.":"No bookings yet. Requests from the website appear here.",
 "Je wekelijkse werkuren en uitzonderingen":"Your weekly hours and exceptions","Wekelijkse uren":"Weekly hours","tot":"to",
 "Uitzonderingen (vrije dagen / afwijkende tijden)":"Exceptions (days off / custom hours)","Gesloten":"Closed","Open (afwijkend)":"Open (custom)","Open":"Open","Toevoegen":"Add","Type":"Type","Geen uitzonderingen.":"No exceptions.",
 "Het spel en algemene instellingen":"The game and general settings","Rad van fortuin":"Prize wheel","Spel actief":"Game active","Einddatum":"End date","Max. per persoon":"Max. per person","Prijskansen (gewichten)":"Prize odds (weights)",
 "Hoe hoger het getal, hoe groter de kans. NONE = geen prijs, AGAIN = extra draai.":"The higher the number, the higher the chance. NONE = no prize, AGAIN = extra spin.",
 "Ingelogd als":"Logged in as","Uitloggen":"Log out",
 "Log in met je e-mailadres":"Log in with your email","E-mailadres":"Email address","Stuur inlogcode":"Send login code","Code uit je e-mail":"Code from your email","Inloggen":"Log in","Ander e-mailadres":"Different email",
 "lead":"lead","actief":"active","klant":"client","afgerond":"completed","inactief":"inactive","nieuw":"new","bevestigd":"confirmed","geannuleerd":"cancelled","ja":"yes","nee":"no",

 "Bijgewerkt":"Updated","Fout":"Error","Fout bij laden":"Error loading","Cliënt aangemaakt":"Client created","Verwijderd":"Deleted","Toegevoegd":"Added","Notitie toegevoegd":"Note added","Status bijgewerkt":"Status updated","Kies een datum":"Pick a date","Naam is verplicht":"Name is required","Deze cliënt verwijderen?":"Delete this client?",

};
function tr(x){ return (LANG==="en" && T[x]!==undefined) ? T[x] : x; }
function TL(html){
  if(LANG!=="en") return html;
  return html.replace(/>([^<>]+)</g, function(m, txt){
    var k=txt.trim();
    if(T[k]!==undefined){ return ">"+T[k]+"<"; }
    return m;
  });
}
function translateStatics(){
  function set(id,nl){ var e=document.getElementById(id); if(e) e.textContent=tr(nl); }
  set("login-sub","Log in met je e-mailadres"); set("lbl-email","E-mailadres");
  set("l-send","Stuur inlogcode"); set("lbl-code","Code uit je e-mail");
  set("l-verify","Inloggen"); set("l-back","Ander e-mailadres");
  set("ingelabel","Ingelogd als"); set("logout","Uitloggen");
}
function setLang(l){
  LANG=l; localStorage.setItem("shaytye_admin_lang", l); document.documentElement.lang=l;
  var bs=document.querySelectorAll(".langbtn");
  for(var i=0;i<bs.length;i++){ bs[i].className="langbtn"+(bs[i].getAttribute("data-l")===LANG?" on":""); }
  translateStatics();
  if($("app") && !$("app").classList.contains("hide")){ renderNav(); render(); }
}

function $(id){ return document.getElementById(id); }
function esc(s){ s = (s===null||s===undefined)?"":String(s);
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function toast(m,bad){ var t=$("toast"); t.textContent=m; t.className = bad?"show err":"show"; setTimeout(function(){t.className="";},2600); }
function fmtDate(s){ if(!s) return "-"; var d=new Date(s); return d.toLocaleDateString("nl-NL",{day:"2-digit",month:"short",year:"numeric"}); }
function fmtDateTime(s){ if(!s) return "-"; var d=new Date(s); return d.toLocaleDateString("nl-NL",{day:"2-digit",month:"short"})+" "+d.toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"}); }
function money(n){ return "€ " + (Number(n||0)).toLocaleString("nl-NL",{minimumFractionDigits:0,maximumFractionDigits:2}); }

async function api(action, payload){
  var body = Object.assign({ action:action, token:TOKEN }, payload||{});
  var r = await fetch(API, {
    method:"POST",
    headers:{ "Authorization":"Bearer "+KEY, "apikey":KEY, "content-type":"application/json", "x-admin-token":TOKEN },
    body: JSON.stringify(body)
  });
  var data = await r.json().catch(function(){ return {error:"parse"}; });
  if(r.status===401 && action!=="request_code" && action!=="verify_code"){ doLogout(true); throw new Error("unauthorized"); }
  if(data.error){ throw new Error(data.detail || data.error); }
  return data;
}

/* ---------------- LOGIN ---------------- */
function lmsg(m,cls){ var e=$("l-msg"); e.textContent=m||""; e.className="msg "+(cls||""); }
$("l-send").onclick = async function(){
  var email = $("l-email").value.trim();
  if(!email){ lmsg(tr("Vul je e-mailadres in."),"err"); return; }
  this.disabled=true; lmsg(tr("Bezig..."));
  try{
    await api("request_code", { email:email });
    window._loginEmail = email;
    $("step-email").classList.add("hide"); $("step-code").classList.remove("hide");
    lmsg(tr("Als dit adres bekend is, is er een code verstuurd."),"ok");
    $("l-code").focus();
  }catch(e){ lmsg(tr("Er ging iets mis. Probeer opnieuw."),"err"); }
  this.disabled=false;
};
$("l-back").onclick = function(){ $("step-code").classList.add("hide"); $("step-email").classList.remove("hide"); lmsg(""); };
$("l-verify").onclick = async function(){
  var code = $("l-code").value.trim();
  if(!/^\d{6}$/.test(code)){ lmsg(tr("Voer de 6-cijferige code in."),"err"); return; }
  this.disabled=true; lmsg(tr("Controleren..."));
  try{
    var d = await api("verify_code", { email:window._loginEmail, code:code });
    TOKEN = d.token; EMAIL = d.email;
    localStorage.setItem("shaytye_admin_token", TOKEN);
    localStorage.setItem("shaytye_admin_email", EMAIL);
    startApp();
  }catch(e){ lmsg(tr("Onjuiste of verlopen code."),"err"); this.disabled=false; }
};
$("l-code").addEventListener("keydown",function(e){ if(e.key==="Enter") $("l-verify").click(); });
$("l-email").addEventListener("keydown",function(e){ if(e.key==="Enter") $("l-send").click(); });

function doLogout(silent){
  try{ if(TOKEN) api("logout",{}); }catch(e){}
  localStorage.removeItem("shaytye_admin_token"); localStorage.removeItem("shaytye_admin_email");
  TOKEN=""; EMAIL="";
  $("app").classList.add("hide"); $("login").classList.remove("hide");
  $("step-code").classList.add("hide"); $("step-email").classList.remove("hide");
  $("l-code").value=""; if(!silent) lmsg("");
}
$("logout").onclick = function(){ doLogout(); };

function statusPill(s){ s=s||"lead"; var m={lead:"lead",actief:"active",klant:"klant",afgerond:"done",inactief:"done",
  "new":"new",confirmed:"active",done:"done",cancelled:"done"};
  var labels={"new":"nieuw",confirmed:"bevestigd",done:"afgerond",cancelled:"geannuleerd"};
  return "<span class='pill "+(m[s]||"done")+"'>"+(labels[s]||s)+"</span>"; }
function boolTag(b){ return b?"<span class='pill active'>ja</span>":"<span class='pill no'>nee</span>"; }
function modal(title,body,foot){
  var o=document.createElement("div"); o.className="overlay"; o.id="overlay";
  o.innerHTML=TL("<div class='modal'><div class='mh'><h3>"+title+"</h3><button class='x' onclick='closeModal()'>&times;</button></div><div class='mb'>"+body+"</div><div class='mf'>"+foot+"</div></div>");
  o.onclick=function(e){ if(e.target===o) closeModal(); };
  document.body.appendChild(o);
}
function closeModal(){ var o=$("overlay"); if(o) o.remove(); }
